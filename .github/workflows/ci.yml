name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train models
        run: python -m src.train

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=src --cov=api --cov-report=term-missing --cov-fail-under=70

      - name: Build check
        run: python -c "from api.main import app; print('Build OK')"

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t diabetes-risk-predictor .
